<script>
        // Micro-interactions for live vote simulation
        function simulateLiveActivity() {
            const votes = [
                document.querySelector('.tabular-nums:nth-of-type(1)'),
                document.querySelector('.tabular-nums:nth-of-type(2)'),
                document.querySelector('.tabular-nums:nth-of-type(3)')
            ];

            setInterval(() => {
                const target = votes[Math.floor(Math.random() * votes.length)];
                if(target) {
                    let current = parseInt(target.innerText.replace(',', ''));
                    current += Math.floor(Math.random() * 5) + 1;
                    target.innerText = current.toLocaleString();
                    
                    // Flash effect
                    target.classList.add('text-white');
                    setTimeout(() => target.classList.remove('text-white'), 300);
                }
            }, 3000);
        }

        // Countdown Timer decrement
        let timeLeft = 221; // 03:41 in seconds
        const timerDisplay = document.querySelector('.font-stat-lg-mobile');

        function updateTimer() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            if(timeLeft < 30) {
                timerDisplay.classList.add('text-error-red', 'pulse-timer');
            }
            
            if(timeLeft > 0) timeLeft--;
        }

        setInterval(updateTimer, 1000);
        simulateLiveActivity();
    </script>
