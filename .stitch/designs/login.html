</div>

</div>
</div>

</button>

                Chỉ dành cho nhân viên nội bộ GEM
            </p>
</footer>

<script>
        // Micro-interaction: Error state simulation
        function handleLogin() {
            const input = document.getElementById('employee-id');
            const error = document.getElementById('error-message');
            const btn = document.querySelector('.btn-primary-glow');

            if (!input.value.trim()) {
                error.classList.remove('hidden');
                input.parentElement.classList.add('bg-error-container/10');

                // Shake animation
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            } else {
                error.classList.add('hidden');
                input.parentElement.classList.remove('bg-error-container/10');

                // Success feedback
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
                setTimeout(() => {
                    btn.innerHTML = 'ĐANG VÀO...';
                }, 800);
            }
        }

        // Handle focus visualization
        const inputEl = document.getElementById('employee-id');
        inputEl.addEventListener('focus', () => {
            document.getElementById('error-message').classList.add('hidden');
        });
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
