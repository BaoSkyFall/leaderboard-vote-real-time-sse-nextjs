<script>
        // Micro-interaction for the START button
        const startBtn = document.querySelector('.bg-primary-container');
        startBtn.addEventListener('click', () => {
            startBtn.innerHTML = `
                <span class="animate-spin material-symbols-outlined" data-icon="sync">sync</span>
                ĐANG KÍCH HOẠT...
            `;
            setTimeout(() => {
                startBtn.innerHTML = `
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;" data-icon="play_arrow">play_arrow</span>
                    BẮT ĐẦU
                `;
            }, 2000);
        });

        // Subtle parallax effect on hero ring
        document.addEventListener('mousemove', (e) => {
            const rings = document.querySelectorAll('.gradient-ring, .w-48');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            rings.forEach(ring => {
                ring.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
